name: Build PDF Tool

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from source
        id: version
        run: |
          $version = (Select-String -Path pdf_tool.py -Pattern 'APP_VERSION\s*=\s*"(.*?)"').Matches.Groups[1].Value
          Write-Host "Version: $version"
          echo "version=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt Pillow

      - name: Install Ghostscript and Tesseract via Chocolatey
        run: choco install ghostscript tesseract --yes --no-progress
        shell: cmd

      - name: Prepare Ghostscript bundle
        run: |
          $gsDir = Get-ChildItem "C:\Program Files\gs" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          Write-Host "Ghostscript found at: $($gsDir.FullName)"

          mkdir gs_bundle\bin
          mkdir gs_bundle\lib
          mkdir gs_bundle\Resource

          Copy-Item "$($gsDir.FullName)\bin\*" "gs_bundle\bin\" -Recurse
          Copy-Item "$($gsDir.FullName)\lib\*" "gs_bundle\lib\" -Recurse
          Copy-Item "$($gsDir.FullName)\Resource\*" "gs_bundle\Resource\" -Recurse

          Write-Host "Ghostscript bundle prepared"
        shell: pwsh

      - name: Prepare Tesseract bundle
        run: |
          $tessDir = "C:\Program Files\Tesseract-OCR"
          if (Test-Path $tessDir) {
            mkdir tesseract_bundle
            Copy-Item "$tessDir\*" "tesseract_bundle\" -Recurse
            Write-Host "Tesseract bundle prepared"
          } else {
            Write-Error "Tesseract not found at $tessDir"
            exit 1
          }
        shell: pwsh

      - name: Generate app icon
        run: python create_icon.py

      - name: Build exe with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --name "PDF Tool" `
            --icon "app_icon.ico" `
            --add-data "gs_bundle;gs" `
            --add-data "tesseract_bundle;tesseract" `
            pdf_tool.py
        shell: pwsh

      - name: Verify exe
        run: |
          if (Test-Path "dist\PDF Tool.exe") {
            $size = (Get-Item "dist\PDF Tool.exe").Length / 1MB
            Write-Host "EXE built successfully! Size: $([math]::Round($size, 1)) MB"
          } else {
            Write-Error "Build failed - exe not found"
            exit 1
          }
        shell: pwsh

      - name: Build installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          if (Test-Path "installer_output\Install PDF Tool.exe") {
            $size = (Get-Item "installer_output\Install PDF Tool.exe").Length / 1MB
            Write-Host "Installer built successfully! Size: $([math]::Round($size, 1)) MB"
          } else {
            Write-Error "Installer build failed"
            exit 1
          }
        shell: pwsh

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Tool-Installer
          path: installer_output/Install PDF Tool.exe
          retention-days: 90

      - name: Upload standalone exe
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Tool-Standalone
          path: dist/PDF Tool.exe
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: PDF Tool v${{ steps.version.outputs.version }}
          body: |
            ## PDF Tool v${{ steps.version.outputs.version }}

            Download **Install PDF Tool.exe** below to install or update.
          files: |
            installer_output/Install PDF Tool.exe
            dist/PDF Tool.exe
          make_latest: true
